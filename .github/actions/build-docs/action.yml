# Composite action: build jupyterbook docs for a tskit-dev package.
#
# The repository must already be checked out before this action is called.
# It installs documentation dependencies, substitutes the __PKG_VERSION__
# placeholder in docs/_config.yml, runs an optional pre-build command, then
# builds via "cd docs && make".
#
# Requirements on the target package:
# - pyproject.toml with a "docs" dependency group
# - docs/_config.yml containing a __PKG_VERSION__ placeholder
# - docs/Makefile with an "all" target that runs the jupyterbook build

name: Build docs
description: Install deps and build jupyterbook docs for a tskit-dev package.

inputs:
  pyproject-directory:
    description: 'Directory containing pyproject.toml (relative to repo root)'
    required: false
    default: '.'

  additional-apt-packages:
    description: 'Space-separated list of additional APT packages to install'
    required: false
    default: ''

  pre-build-command:
    description: 'Command to run after installing deps but before the docs build'
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Install additional APT packages
      if: inputs.additional-apt-packages != ''
      shell: bash
      run: sudo apt-get update && sudo apt-get install -y ${{ inputs.additional-apt-packages }}

    - name: Install uv
      uses: astral-sh/setup-uv@v6
      with:
        version: "0.8.15"

    - name: Install doc deps
      shell: bash
      run: uv sync --no-default-groups --project=${{ inputs.pyproject-directory }} --locked --group docs

    - name: Set build version
      shell: bash
      run: |
        set -euo pipefail
        export PROJECT_DIR="${{ inputs.pyproject-directory }}"
        PKG_VERSION="$(
        uv run --no-default-groups --project "$PROJECT_DIR" python - <<PY
        import os, tomllib, pathlib, importlib.metadata as m
        project_dir = pathlib.Path(os.environ['PROJECT_DIR'])
        data = tomllib.loads((project_dir / 'pyproject.toml').read_text())
        name = data['project']['name']
        print(m.version(name))
        PY
        )"
        echo "PKG_VERSION=$PKG_VERSION"
        sed -i s/__PKG_VERSION__/${PKG_VERSION}/g docs/_config.yml

    - name: Pre-build
      if: inputs.pre-build-command != ''
      shell: bash
      run: ${{ inputs.pre-build-command }}

    - name: Build documentation
      shell: bash
      run: cd docs && make
