# Composite action: build jupyterbook docs for a tskit-dev package.
#
# The repository must already be checked out before this action is called.
# It installs documentation dependencies, substitutes the __PKG_VERSION__
# placeholder in docs/_config.yml, runs an optional pre-build command, then
# builds the docs using jupyterbook
#
# Requirements on the target package:
# - pyproject.toml with a "docs" dependency group
# - docs/_config.yml containing a __PKG_VERSION__ placeholder

name: Build docs
description: Install deps and build jupyterbook docs for a tskit-dev package.

inputs:
  pyproject-directory:
    description: 'Directory containing pyproject.toml (relative to repo root)'
    required: false
    default: '.'

  additional-apt-packages:
    description: 'Space-separated list of additional APT packages to install'
    required: false
    default: ''

  install-slim:
    description: 'Whether to install SLiM'
    required: false
    default: 'false'

  install-playwright:
    description: 'Install Playwright (chromium) for docs that render browser screenshots'
    required: false
    default: 'false'

runs:
  using: composite
  steps:
    - name: Install additional APT packages
      if: inputs.additional-apt-packages != ''
      shell: bash
      env:
        ADDITIONAL_APT_PACKAGES: ${{ inputs.additional-apt-packages }}
      run: sudo apt-get update && sudo apt-get install -y ${ADDITIONAL_APT_PACKAGES}

    - name: Set up micromamba
      if: ${{ inputs.install-slim == 'true' }}
      uses: mamba-org/setup-micromamba@d7c9bd84e824b79d2af72a2d4196c7f4300d3476  # v3.0.0

    - name: Install SLiM
      if: ${{ inputs.install-slim == 'true' }}
      shell: bash
      # MAMBA_ROOT_PREFIX is a fixed, controlled path set by setup-micromamba, not attacker-controlled.
      run: | # zizmor: ignore[github-env]
        micromamba install -n base -y slim
        echo "$MAMBA_ROOT_PREFIX/bin" >> $GITHUB_PATH

    - name: Verify SLiM
      if: ${{ inputs.install-slim == 'true' }}
      shell: bash
      run: slim -v

    - name: Install uv
      uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
      with:
        version: "0.10.0"

    - name: Install doc deps
      shell: bash
      env:
        PYPROJECT_DIRECTORY: ${{ inputs.pyproject-directory }}
      run: uv sync --no-default-groups --project=${PYPROJECT_DIRECTORY} --locked --group docs

    - name: Set build version
      shell: bash
      env:
        PYPROJECT_DIRECTORY: ${{ inputs.pyproject-directory }}
      run: |
        set -euo pipefail
        PKG_VERSION="$(
        uv run --no-default-groups --project "$PYPROJECT_DIRECTORY" python - <<PY
        import os, tomllib, pathlib, importlib.metadata as m
        project_dir = pathlib.Path(os.environ['PYPROJECT_DIRECTORY'])
        data = tomllib.loads((project_dir / 'pyproject.toml').read_text())
        name = data['project']['name']
        print(m.version(name))
        PY
        )"
        echo "PKG_VERSION=$PKG_VERSION"
        sed -i s/__PKG_VERSION__/${PKG_VERSION}/g docs/_config.yml

    - name: Install Playwright
      if: ${{ inputs.install-playwright == 'true' }}
      shell: bash
      env:
        PYPROJECT_DIRECTORY: ${{ inputs.pyproject-directory }}
      run: uv run --no-default-groups --project=${PYPROJECT_DIRECTORY} --locked --group=docs playwright install --with-deps chromium

    - name: Build documentation
      shell: bash
      working-directory: docs
      run: make
