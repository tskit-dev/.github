name: Binary wheel builds

on:
  workflow_call:
    inputs:
      pyproject-directory:
        description: 'Directory to find pyproject.toml'
        required: false
        type: string
        default: '.'
      os-list:
        description: "JSON array of OS runners"
        required: false
        type: string
        default: '["ubuntu-24.04", "windows-2025", "macos-15-intel", "macos-14"]'

permissions:
  contents: read

jobs:
  build-sdist:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
          submodules: true
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          version: "0.10.0"

      - name: Build sdist
        env:
          PYPROJECT_DIRECTORY: ${{ inputs.pyproject-directory }}
        run: uv build --project=${PYPROJECT_DIRECTORY} --sdist -o dist

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: build-sdist
          path: dist/*.tar.gz
          if-no-files-found: error

  build-wheels:
    needs: [ 'build-sdist' ]
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: ${{ fromJSON(inputs.os-list) }}
    steps:
      - name: Cancel Previous Runs
        uses: styfle/cancel-workflow-action@d07a454dad7609a92316b57b23c9ccfd4f59af66  # 0.13.1
        with:
          access_token: ${{ github.token }}

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: build-sdist

      - name: Copy sdist (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Copy-Item *.tar.gz sdist.tar.gz

      - name: Copy sdist (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: cp *.tar.gz sdist.tar.gz

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          version: "0.10.0"

      - name: Install cibuildwheel
        env:
          PYPROJECT_DIRECTORY: ${{ inputs.pyproject-directory }}
        run: uv sync --project=${PYPROJECT_DIRECTORY} --locked --only-group wheels

      - name: Set CIBW_ARCHS_MACOS based on native arch
        if: runner.os == 'macOS'
        shell: bash
        run: |
          ARCH=$(uname -m)
          if [ "$ARCH" = "x86_64" ]; then
            echo "CIBW_ARCHS_MACOS=x86_64" >> "$GITHUB_ENV"
          elif [ "$ARCH" = "arm64" ]; then
            echo "CIBW_ARCHS_MACOS=arm64" >> "$GITHUB_ENV"
          else
            echo "Unknown macOS architecture: $ARCH"
            exit 1
          fi

      - name: Build wheels
        env:
          PYPROJECT_DIRECTORY: ${{ inputs.pyproject-directory }}
        run: uv run --only-group wheels --project=${PYPROJECT_DIRECTORY} cibuildwheel sdist.tar.gz

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: build-wheels-${{ matrix.os }}-${{ strategy.job-index }}
          path: ./wheelhouse/*.whl
          if-no-files-found: error
