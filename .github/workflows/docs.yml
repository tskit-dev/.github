# Reusable workflow for building docs in a tskit-dev package repo.
#
# Called from each package's own .github/workflows/docs.yml on push/PR.
# Checks out the current repo, delegates the build to the build-docs
# composite action, and triggers a tskit-site rebuild on merge to main.
#
# Requirements: see .github/actions/build-docs/action.yml

name: Documentation workflow for tskit-dev

on:
  workflow_call:
    inputs:
      pyproject-directory:
        description: 'Directory containing pyproject.toml (relative to repo root)'
        required: false
        type: string
        default: '.'

      additional-apt-packages:
        description: 'Additional APT packages to install'
        required: false
        type: string
        default: ''

      pre-build-command:
        description: 'Command to run after installing deps but before the docs build'
        required: false
        type: string
        default: ''

jobs:
  Docs:
    name: Build docs
    runs-on: ubuntu-24.04
    steps:
      - uses: styfle/cancel-workflow-action@0.12.1
        with:
          access_token: ${{ github.token }}

      - uses: actions/checkout@v4.2.2
        with:
          submodules: true
          fetch-depth: 0

      - uses: tskit-dev/.github/.github/actions/build-docs@main
        with:
          pyproject-directory: ${{ inputs.pyproject-directory }}
          additional-apt-packages: ${{ inputs.additional-apt-packages }}
          pre-build-command: ${{ inputs.pre-build-command }}

      - name: Trigger tskit-site rebuild
        if: github.ref == 'refs/heads/main'
        run: |
          curl -X POST https://api.github.com/repos/tskit-dev/tskit-site/dispatches \
          -H 'Accept: application/vnd.github.everest-preview+json' \
          -u AdminBot-tskit:${{ secrets.ADMINBOT_TOKEN }} \
          --data '{"event_type":"build-docs"}'
